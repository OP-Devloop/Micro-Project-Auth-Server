spring.application.name=Micro-Project-Auth-Server
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.forward-headers-strategy=framework
# Port THIS application will run on
# Uses environment variable SERVER_PORT if it exists
# Otherwise defaults to 9000
server.port=${SERVER_PORT:9000}
# URL to the Auth Server (another service)
# Uses AUTH_SERVER_URL if provided
# Otherwise defaults to http://localhost:8080
app.auth-server-url=${AUTH_SERVER_URL:http://localhost:8080}

