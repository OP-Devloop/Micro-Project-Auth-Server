spring.application.name=Micro-Project-Auth-Server
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.forward-headers-strategy=framework
server.port=${SERVER_PORT:8080}
app.jwt.issuer=${JWT_ISSUER:http://localhost:8080}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.jwt.key-id=${JWT_KEY_ID:jwt-key-1}
app.jwt.public-key=${JWT_PUBLIC_KEY}
app.jwt.private-key=${JWT_PRIVATE_KEY}
# Port THIS application will run on
# Uses environment variable SERVER_PORT if it exists
# Otherwise defaults to 9000
# server.port=${SERVER_PORT:9000}
# URL to the Auth Server (another service)
# Uses AUTH_SERVER_URL if provided
# Otherwise defaults to http://localhost:8080
# app.auth-server-url=${AUTH_SERVER_URL:http://localhost:8080}

